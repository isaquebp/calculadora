<!DOCTYPE html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <script type="text/javascript" src="./index.js" defer=""></script>
    <link rel="stylesheet" href="./index.css">
  </head>

  <body>
    <h1>Calculadora</h1>
    <div id="calculadora">
      <div id="tela-resultado">
      </div>

      <div id="botoes">
        <button class="botao" id="multiplicacao">*</button>
        <button class="botao" id="divisao">/</button>
        <button class="botao" id="apagar-tudo">C</button>
        <button class="botao" id="backspace">⌫</button>
        <button class="botao" id="adicao">+</button>
        <button class="botao" id="subtracao">-</button>
        <button class="botao" id="virgula">,</button>
        <button class="botao" id="igual">=</button>
      </div>

      <div id="numericos">
        <button class="numero" id="um">1</button>
        <button class="numero" id="dois">2</button>
        <button class="numero" id="tres">3</button>
        <button class="numero" id="quatro">4</button>
        <button class="numero" id="cinco">5</button>
        <button class="numero" id="seis">6</button>
        <button class="numero" id="sete">7</button>
        <button class="numero" id="oito">8</button>
        <button class="numero" id="nove">9</button>
        <button class="botao" id="zero">0</button>
      </div>
    </div>

  </body>

</html>
